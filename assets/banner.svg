<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#13201a"/>
      <stop offset="60%" stop-color="#0a120e"/>
      <stop offset="100%" stop-color="#04060a"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d2a22"/>
      <stop offset="100%" stop-color="#0c130e"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- low-poly city skyline -->
  <g fill="#16241c" stroke="#22382c" stroke-width="2">
    <rect x="40"  y="250" width="90"  height="120"/>
    <rect x="150" y="210" width="70"  height="160"/>
    <rect x="240" y="270" width="110" height="100"/>
    <rect x="980" y="230" width="80"  height="140"/>
    <rect x="1075" y="265" width="90" height="105"/>
    <rect x="900" y="280" width="70"  height="90"/>
  </g>
  <!-- pitched roofs -->
  <g fill="#3a201a" stroke="#52302a" stroke-width="2">
    <polygon points="240,270 295,238 350,270"/>
    <polygon points="900,280 935,255 970,280"/>
  </g>
  <!-- lit windows -->
  <g fill="#9fc6e4" opacity="0.55">
    <rect x="170" y="230" width="12" height="14"/><rect x="195" y="230" width="12" height="14"/>
    <rect x="170" y="262" width="12" height="14"/><rect x="195" y="262" width="12" height="14"/>
    <rect x="1000" y="250" width="12" height="14"/><rect x="1025" y="250" width="12" height="14"/>
    <rect x="1000" y="285" width="12" height="14"/>
  </g>

  <rect x="0" y="365" width="1200" height="55" fill="url(#ground)"/>

  <!-- zombie eye dots in the dark -->
  <g fill="#ff3322">
    <circle cx="430" cy="330" r="3"/><circle cx="440" cy="330" r="3"/>
    <circle cx="690" cy="345" r="3"/><circle cx="700" cy="345" r="3"/>
    <circle cx="820" cy="320" r="3"/><circle cx="830" cy="320" r="3"/>
  </g>

  <!-- title -->
  <text x="600" y="190" text-anchor="middle" font-size="96" font-weight="800"
        letter-spacing="14" fill="#7fffd4" filter="url(#glow)">SURRONDEAD</text>
  <text x="600" y="238" text-anchor="middle" font-size="22" font-weight="600"
        letter-spacing="9" fill="#5fae8f">OPEN&#8209;WORLD&#160;&#160;ZOMBIE&#160;&#160;SURVIVAL&#160;&#160;FPS</text>

  <!-- crosshair -->
  <g stroke="#9fffe0" stroke-width="3" opacity="0.9">
    <line x1="600" y1="282" x2="600" y2="306"/>
    <line x1="600" y1="324" x2="600" y2="348"/>
    <line x1="566" y1="315" x2="590" y2="315"/>
    <line x1="610" y1="315" x2="634" y2="315"/>
  </g>

  <text x="600" y="402" text-anchor="middle" font-size="15" letter-spacing="4" fill="#3f6a58">
    Three.js &#183; single&#8209;file &#183; no build step</text>
</svg>
